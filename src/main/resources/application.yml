server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: git
  cloud:
    config:
      server:
        git:
          uri: https://github.com/khubebanjare/config-server-configuration-files.git
          clone-on-start: true
          default-label: main
          timeout: 5
          force-pull: true
    bus:
      enabled: true
          
eureka:
  client:
    enabled: true
    service-url:
      defaultZone: "http://localhost:8761/eureka/"